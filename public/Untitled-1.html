<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instantown - Secure Checkout</title>
    <style>
        :root { --green: #22c55e; --black: #050505; --grey: #1a1a1a; }
        body { margin: 0; background: var(--black); color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .checkout-box { background: var(--grey); width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; border: 1px solid #333; box-sizing: border-box; }
        
        label { display: block; font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; font-family: monospace; }
        input:focus { border-color: var(--green); outline: none; }

        .card-extra { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .summary { background: #000; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px dashed #444; }
        .btn-pay { width: 100%; padding: 20px; background: var(--green); border: none; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .secure-badge { font-size: 10px; color: #444; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 25px;">Pagamento Escrow</h2>

    <div class="checkout-box">
        <div class="summary">
            <div style="font-size: 12px; color: #888;">Totale da bloccare:</div>
            <div style="font-size: 24px; font-weight: 800; color: var(--green);">€ 4.00</div>
            <div style="font-size: 11px; margin-top: 5px;">Destinazione: Panetteria Rossi</div>
        </div>

        <label>Numero Carta</label>
        <input type="text" placeholder="0000 0000 0000 0000" id="card-num" maxlength="19">

        <div class="card-extra">
            <div>
                <label>Scadenza</label>
                <input type="text" placeholder="MM/AA" maxlength="5">
            </div>
            <div>
                <label>CVV</label>
                <input type="password" placeholder="***" maxlength="3">
            </div>
        </div>

        <button class="btn-pay" onclick="processPayment()">AUTORIZZA E BLOCCA</button>
        
        <div class="secure-badge">🔒 Connessione Crittografata SSL - Instantown Pay</div>
    </div>

    <script>
        function processPayment() {
            const btn = document.querySelector('.btn-pay');
            btn.innerText = "ELABORAZIONE...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            // Simuliamo il tempo di risposta della banca (2 secondi)
            setTimeout(() => {
                window.location.href = "transaction.html";
            }, 2000);
        }

        // Formattazione automatica numero carta
        document.getElementById('card-num').oninput = function (e) {
            this.value = this.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
        };
    </script>
</body>
</html>
