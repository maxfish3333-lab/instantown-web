<head>
<meta charset="UTF-8">

<title>INSTANTOWN — Servizi Essenziali</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --rosso:#8B1A1A;--rosso-l:#C0392B;--rosso-p:#FDF0EF;
  --ocra:#C8860A;--ocra-l:#E8A020;--ocra-p:#FDF3DC;
  --cielo:#4A90C4;--cielo-l:#6AAFD8;
  --verde:#1A7A3A;--verde-l:#22A050;--verde-p:#EAF5EE;
  --ink:#1C1410;--ink-m:#3D2E24;--ink-mu:#6B5A4E;
  --bianco:#FDFAF4;--rule:rgba(139,26,26,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;}

/* ── STRIPE ── */
.stripe{height:4px;background:linear-gradient(90deg,var(--rosso-l) 33.3%,#fff 33.3%,#fff 66.6%,var(--cielo) 66.6%);position:relative;z-index:1000;}

/* ── TOP BAR ── */
.topbar{
  position:absolute;top:4px;left:0;right:0;z-index:900;
  background:rgba(28,20,16,.88);backdrop-filter:blur(8px);
  padding:10px 16px;display:flex;align-items:center;gap:12px;
}
.topbar-back{color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;flex-shrink:0;}
.topbar-back:hover{color:var(--ocra-l);}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff;flex:1;}
.topbar-title span{color:var(--verde-l);}
.gps-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:5px 12px;font-size:11px;color:rgba(255,255,255,.6);
  flex-shrink:0;
}
.gps-dot{width:7px;height:7px;border-radius:50%;background:#666;flex-shrink:0;}
.gps-dot.active{background:var(--verde-l);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAPPA ── */
#map{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;
}

/* ── RADAR OVERLAY ── */
.radar-ring{
  position:absolute;z-index:50;pointer-events:none;
  border-radius:50%;border:1.5px solid rgba(34,160,80,.35);
  transform:translate(-50%,-50%);
  animation:radarPulse 3s ease-out infinite;
}
@keyframes radarPulse{
  0%{opacity:.8;transform:translate(-50%,-50%) scale(.6);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.4);}
}

/* ── FILTRI CATEGORIA ── */
.filtri{
  position:absolute;bottom:0;left:0;right:0;z-index:800;
  padding:10px 12px 14px;
  display:flex;gap:7px;overflow-x:auto;
  background:linear-gradient(to top,rgba(28,20,16,.7) 0%,transparent 100%);
  scrollbar-width:none;
}
.filtri::-webkit-scrollbar{display:none;}
.filtro{
  flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);
  background:rgba(28,20,16,.6);backdrop-filter:blur(6px);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  color:rgba(255,255,255,.75);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.filtro:hover{border-color:rgba(255,255,255,.5);}
.filtro.active{background:var(--verde);border-color:var(--verde-l);color:#fff;}
.filtro.active-ocra{background:var(--ocra);border-color:var(--ocra-l);color:var(--ink);}

/* ── SCHEDA POI (bottom sheet) ── */
.poi-sheet{
  position:absolute;bottom:-300px;left:0;right:0;z-index:900;
  background:var(--bianco);border-radius:20px 20px 0 0;
  box-shadow:0 -4px 32px rgba(0,0,0,.25);
  transition:bottom .35s cubic-bezier(.32,1,.52,.98);
  padding:0 0 32px;
}
.poi-sheet.open{bottom:0;}
.sheet-handle{width:36px;height:4px;background:var(--rule);border-radius:2px;margin:12px auto 0;}
.sheet-body{padding:18px 20px 0;}
.sheet-row1{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;}
.sheet-emoji{font-size:36px;flex-shrink:0;}
.sheet-info{flex:1;}
.sheet-cat{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--verde);margin-bottom:4px;}
.sheet-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:4px;}
.sheet-desc{font-size:13px;color:var(--ink-mu);line-height:1.6;}
.sheet-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.sheet-badge{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid;}
.badge-verde{background:var(--verde-p);color:var(--verde);border-color:rgba(26,122,58,.2);}
.badge-ocra{background:var(--ocra-p);color:var(--ocra);border-color:rgba(200,134,10,.2);}
.badge-cielo{background:#E8F4FB;color:var(--cielo);border-color:rgba(74,144,196,.2);}
.badge-rosso{background:var(--rosso-p);color:var(--rosso);border-color:rgba(139,26,26,.2);}
.btn-portami{
  width:100%;padding:15px;border:none;border-radius:8px;
  background:var(--verde);color:#fff;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:10px;transition:background .2s;letter-spacing:.02em;
}
.btn-portami:hover{background:var(--verde-l);}
.btn-portami-icon{font-size:20px;}
.sheet-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:20px;color:var(--ink-mu);
  cursor:pointer;padding:4px 8px;border-radius:4px;
}
.sheet-close:hover{background:var(--rule);}

/* ── MARKER PERSONALIZZATI ── */
.marker-wrap{
  min-width:52px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 3px 14px rgba(0,0,0,.45);
  border:2px solid rgba(255,255,255,.9);
  transition:transform .18s;padding:0 10px;
  font-family:'DM Sans',sans-serif;letter-spacing:.01em;
  white-space:nowrap;
}
.marker-wrap:hover{transform:scale(1.08);}
.marker-pubblico{background:#1A7A3A;color:#fff;}
.marker-iconico{background:#C8860A;color:#fff;}
.marker-bagni{background:#1A4A8A;color:#fff;}
.marker-wrap .m-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.8);flex-shrink:0;}

/* ── LOADING ── */
.gps-loading{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:800;background:rgba(28,20,16,.82);backdrop-filter:blur(8px);
  border-radius:12px;padding:24px 28px;text-align:center;color:#fff;
}
.gps-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);
  border-top-color:var(--verde-l);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.gps-loading p{font-size:13px;color:rgba(255,255,255,.6);}
</style>

    id:'vaticano', tipo:'iconico', emoji:'🕍',
    nome:'Città del Vaticano',
    cat:'Patrimonio UNESCO',
    desc:'Piazza San Pietro, Basilica di San Pietro, Musei Vaticani e Cappella Sistina. Il cuore della Cristianità.',
    badges:[{t:'UNESCO',c:'ocra'},{t:'Patrimonio mondiale',c:'ocra'}],
    lat:41.9022, lon:12.4539,
    dest:'Piazza+San+Pietro+Vaticano+Roma'
  },
  {
    id:'spagna', tipo:'iconico', emoji:'🌸',
    nome:'Piazza di Spagna',
    cat:'Icona di Roma',
    desc:'La Scalinata di Trinità dei Monti e la Fontana della Barcaccia. Uno dei luoghi più fotografati al mondo.',
    badges:[{t:'Monumento',c:'ocra'},{t:'Centro storico',c:'rosso'}],
    lat:41.9058, lon:12.4823,
    dest:'Piazza+di+Spagna+Roma+Scalinata'
  },
];

// ═══════════════════════════════════════════════
// STATO
// ═══════════════════════════════════════════════
let map, userMarker, userLat, userLon;
let poiSelezionato = null;
let filtroAttivo   = 'tutti';
let markers        = {};

// ═══════════════════════════════════════════════
// INIT MAPPA
// ═══════════════════════════════════════════════
function initMappa(lat, lon) {
  document.getElementById('gps-loading').style.display = 'none';
  document.getElementById('gps-dot').classList.add('active');
  document.getElementById('gps-label').textContent = 'GPS attivo';

  userLat = lat; userLon = lon;

  map = L.map('map', {
    center: [lat, lon],
    zoom: 15,
    zoomControl: false,
    attributionControl: true
  });

  // Tile OpenStreetMap — stile scuro per contrasto
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);

  // Marker utente
  const userIcon = L.divIcon({
    html:`<div style="
      width:18px;height:18px;border-radius:50%;
      background:var(--cielo);border:3px solid #fff;
      box-shadow:0 0 0 6px rgba(74,144,196,.25);
    "></div>`,
    iconSize:[18,18], iconAnchor:[9,9], className:''
  });
  userMarker = L.marker([lat,lon], {icon:userIcon, zIndexOffset:1000}).addTo(map);

  // Cerchio raggio 200m
  L.circle([lat,lon], {
    radius:200, color:'rgba(34,160,80,.4)',
    fillColor:'rgba(34,160,80,.05)', fillOpacity:1, weight:1.5
  }).addTo(map);

  // Aggiungi tutti i POI
  POIS.forEach(addMarker);
}

// ═══════════════════════════════════════════════
// MARKER POI
// ═══════════════════════════════════════════════
// Etichette brevi per i marker
const MARKER_LABEL = {
  nasoni:'💧 Nasoni', bagni:'🚻 Bagni', wifi:'📶 Wi-Fi',
  papa:'✝ Papa Francesco', vaticano:'🕍 Vaticano', spagna:'🌸 P.za di Spagna'
};

function addMarker(poi) {
  const colClass = poi.tipo === 'pubblico' ? 'marker-pubblico' : poi.tipo === 'bagni' ? 'marker-bagni' : 'marker-iconico';
  const label = MARKER_LABEL[poi.id] || poi.nome.substring(0,14);
  const icon = L.divIcon({
    html:`<div class="marker-wrap ${colClass}"><span class="m-dot"></span>${label}</div>`,
    iconSize:[null,36], iconAnchor:[0,18], className:''
  });
  const m = L.marker([poi.lat, poi.lon], {icon}).addTo(map);
  m.on('click', () => apriSheet(poi));
  markers[poi.id] = {marker:m, poi};
}

// ═══════════════════════════════════════════════
// SCHEDA POI
// ═══════════════════════════════════════════════
// ── HAVERSINE ──
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function formatDist(m){
  if(m<1000) return m+'m';
  return (m/1000).toFixed(1).replace('.',',')+'km';
}

function apriSheet(poi) {
  poiSelezionato = poi;
  document.getElementById('s-emoji').textContent = poi.emoji;
  document.getElementById('s-cat').textContent   = poi.cat;
  document.getElementById('s-name').textContent  = poi.nome;
  document.getElementById('s-desc').textContent  = poi.desc;
  document.getElementById('s-meta').innerHTML    =
    poi.badges.map(b=>`<span class="sheet-badge badge-${b.c}">${b.t}</span>`).join('');

  // Distanza dall utente
  const distEl = document.getElementById('s-dist');
  if(userLat && userLon){
    const d = haversine(userLat,userLon,poi.lat,poi.lon);
    distEl.textContent = '📍 '+formatDist(d)+' da te';
    distEl.style.display='inline-block';
    // Colore in base alla distanza
    if(d<=300){
      distEl.style.background='#EAF5EE';distEl.style.color='#1A7A3A';distEl.style.borderColor='rgba(26,122,58,.2)';
    } else if(d<=1000){
      distEl.style.background='#FDF3DC';distEl.style.color='#C8860A';distEl.style.borderColor='rgba(200,134,10,.2)';
    } else {
      distEl.style.background='#FDF0EF';distEl.style.color='#8B1A1A';distEl.style.borderColor='rgba(139,26,26,.2)';
    }
  } else {
    distEl.style.display='none';
  }

  document.getElementById('poi-sheet').classList.add('open');
  map.panTo([poi.lat, poi.lon], {animate:true, duration:.5});
}

function chiudiSheet() {
  document.getElementById('poi-sheet').classList.remove('open');
  poiSelezionato = null;
}

// ═══════════════════════════════════════════════
// PORTAMI QUI
// ═══════════════════════════════════════════════
function portaMiQui() {
  if(!poiSelezionato) return;
  const dest = poiSelezionato.dest;
  let url;
  if(userLat && userLon) {
    // Con posizione utente — percorso da → a
    url = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${dest}&travelmode=walking`;
  } else {
    // Senza GPS — apre solo la destinazione
    url = `https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=walking`;
  }
  window.open(url, '_blank');
}

// ═══════════════════════════════════════════════
// FILTRI
// ═══════════════════════════════════════════════
function filtra(tipo, btn) {
  filtroAttivo = tipo;
  document.querySelectorAll('.filtro').forEach(b => {
    b.classList.remove('active','active-ocra');
  });
  btn.classList.add(tipo === 'iconico' ? 'active-ocra' : 'active');

  Object.values(markers).forEach(({marker, poi}) => {
    if(tipo === 'tutti' || poi.tipo === tipo) {
      if(!map.hasLayer(marker)) map.addLayer(marker);
    } else {
      if(map.hasLayer(marker)) map.removeLayer(marker);
    }
  });

  chiudiSheet();
}

// ═══════════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════════
function startGPS() {
  if(!navigator.geolocation) {
    // Fallback: centra su Roma
    initMappa(41.9028, 12.4964);
    document.getElementById('gps-label').textContent = 'GPS non disponibile';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => initMappa(pos.coords.latitude, pos.coords.longitude),
    () => {
      // Fallback Roma centro
      initMappa(41.9028, 12.4964);
      document.getElementById('gps-label').textContent = 'Roma (default)';
    },
    {enableHighAccuracy:true, timeout:8000, maximumAge:0}
  );

  // Aggiornamento continuo posizione
  navigator.geolocation.watchPosition(pos => {
    const {latitude:lat, longitude:lon} = pos.coords;
    userLat = lat; userLon = lon;
    if(userMarker) userMarker.setLatLng([lat,lon]);
  }, null, {enableHighAccuracy:true});
}

// Chiudi sheet cliccando sulla mappa
document.getElementById('map').addEventListener('click', e => {
  if(e.target.id === 'map') chiudiSheet();
});

// Swipe down per chiudere sheet
let touchStartY = 0;
document.getElementById('poi-sheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
});
document.getElementById('poi-sheet').addEventListener('touchend', e => {
  if(e.changedTouches[0].clientY - touchStartY > 60) chiudiSheet();
});

startGPS();
</script>
