<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instantown - Secure Checkout</title>
    <style>
        :root { --green: #22c55e; --black: #050505; --grey: #1a1a1a; }
        body { margin: 0; background: var(--black); color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        
        .checkout-box { background: var(--grey); width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; border: 1px solid #333; box-sizing: border-box; margin-top: 20px; }
        
        label { display: block; font-size: 11px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; font-family: monospace; transition: 0.2s; }
        input:focus { border-color: var(--green); outline: none; background: #080808; }

        .card-extra { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .summary { background: #000; padding: 20px; border-radius: 18px; margin-bottom: 25px; border: 1px dashed #333; }
        .btn-pay { width: 100%; padding: 20px; background: var(--green); border: none; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; color: black; text-transform: uppercase; letter-spacing: 1px; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .secure-badge { font-size: 10px; color: #444; text-align: center; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

    <div style="width: 100%; max-width: 400px;">
        <a href="map.html" style="color: #666; text-decoration: none; font-size: 13px;">← Torna alla mappa</a>
        <h2 style="margin: 20px 0 10px 0;">Pagamento Escrow</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 30px;">I fondi verranno trattenuti e rilasciati solo all'incontro fisico.</p>
    </div>

    <div class="checkout-box">
        <div class="summary">
            <div style="font-size: 11px; color: #666; text-transform: uppercase;">Totale da bloccare</div>
            <div style="font-size: 28px; font-weight: 900; color: var(--green); margin: 5px 0;">€ 4.00</div>
            <div style="font-size: 12px; color: #aaa;">Oggetto: 5kg Farina 00</div>
        </div>

        <label>Numero della Carta</label>
        <input type="text" placeholder="0000 0000 0000 0000" id="card-num" maxlength="19" inputmode="numeric">

        <div class="card-extra">
            <div>
                <label>Scadenza</label>
                <input type="text" placeholder="MM/AA" maxlength="5" id="card-exp">
            </div>
            <div>
                <label>CVV</label>
                <input type="password" placeholder="***" maxlength="3" id="card-cvv">
            </div>
        </div>

        <button class="btn-pay" id="pay-button" onclick="processPayment()">AUTORIZZA E BLOCCA</button>
        
        <div class="secure-badge">
            <span style="font-size: 14px;">🔒</span> 
            CRITTOGRAFIA SSL ATTIVA - INSTANTOWN PAY
        </div>
    </div>

    <script>
        function processPayment() {
            const btn = document.getElementById('pay-button');
            const cardNum = document.getElementById('card-num').value;

            if(cardNum.length < 16) {
                alert("Inserisci un numero di carta valido per il test.");
                return;
            }

            btn.innerText = "VERIFICA BANCA...";
            btn.disabled = true;

            // Simuliamo il delay della transazione (2.5 secondi)
            setTimeout(() => {
                btn.innerText = "FONDI BLOCCATI!";
                btn.style.background = "#fff";
                
                setTimeout(() => {
                    window.location.href = "transaction.html";
                }, 1000);
            }, 2500);
        }

        // Formattazione automatica numero carta (aggiunge spazi ogni 4 cifre)
        document.getElementById('card-num').oninput = function (e) {
            let v = this.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            let matches = v.match(/\d{4,16}/g);
            let match = matches && matches[0] || '';
            let parts = [];
            for (let i = 0, len = match.length; i < len; i += 4) {
                parts.push(match.substring(i, i + 4));
            }
            if (parts.length) {
                this.value = parts.join(' ');
            } else {
                this.value = v;
            }
        };

        // Formattazione automatica data MM/AA
        document.getElementById('card-exp').oninput = function (e) {
            this.value = this.value.replace(/[^\d]/g, '').replace(/(.{2})/, '$1/').trim();
        };
    </script>
</body>
</html>
