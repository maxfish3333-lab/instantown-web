<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Hub - Nazionale</title>
    <style>
        :root { --blue: #3b82f6; --black: #050505; }
        body { background: var(--black); color: white; font-family: sans-serif; padding: 20px; }
        .box-richiesta { background: #111; border: 1px solid #333; padding: 20px; border-radius: 20px; }
        input, textarea, select { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; margin-top: 10px; }
        
        #results { 
            background: #080808; border: 1px solid var(--blue); position: absolute; width: 90%; 
            z-index: 100; display: none; border-radius: 10px; max-height: 200px; overflow-y: auto;
        }
        .item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .item b { color: var(--blue); }

        .selected-indicator { 
            background: rgba(59, 130, 246, 0.1); border: 1px solid var(--blue); 
            padding: 15px; border-radius: 12px; margin-top: 15px; display: none; 
        }
        .btn-post { width: 100%; padding: 18px; background: var(--blue); border: none; color: white; font-weight: bold; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <a href="index.html" style="color:#666; text-decoration:none; font-size:12px;">← Torna alla Hub</a>
    <h2>Lancia Richiesta B2B</h2>

    <div class="box-richiesta">
        <label style="font-size: 11px; color: #888;">COSA CERCHI? (Database Nazionale)</label>
        <input type="text" id="cerca_b2b" placeholder="Scrivi 3 lettere (es: meccanica, vini...)" oninput="ricercaDettagliata(this.value)">
        <div id="results"></div>

        <div id="selected_display" class="selected-indicator">
            <div id="res_nome" style="font-weight:bold; color:var(--blue);"></div>
            <div id="res_cod" style="font-size:12px; margin: 5px 0;"></div>
            <div id="res_desc" style="font-size:11px; color:#aaa; font-style:italic; border-top:1px solid #333; padding-top:5px;"></div>
        </div>

        <label style="font-size: 11px; color: #888; display:block; margin-top:20px;">DETTAGLI TECNICI (Max 10 righe)</label>
        <textarea rows="10" placeholder="Specifiche, quantità, certificazioni..."></textarea>
        
        <button class="btn-post" onclick="alert('Richiesta indicizzata e pubblicata!')">INVIA A TUTTE LE IMPRESE</button>
    </div>

    <script src="database.js"></script>

    <script>
        function ricercaDettagliata(val) {
            const out = document.getElementById('results');
            out.innerHTML = "";
            if(val.length < 3) { out.style.display = 'none'; return; }

            const matches = dbAteco.filter(i => i.n.toLowerCase().includes(val.toLowerCase()));
            
            if(matches.length > 0) {
                out.style.display = 'block';
                matches.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `<b>${m.id}</b><br>${m.n}`;
                    div.onclick = () => {
                        document.getElementById('cerca_b2b').value = m.n;
                        out.style.display = 'none';
                        document.getElementById('selected_display').style.display = 'block';
                        document.getElementById('res_nome').innerText = m.n;
                        document.getElementById('res_cod').innerText = "Codice ATECO: " + m.id;
                        document.getElementById('res_desc').innerText = m.d;
                    };
                    out.appendChild(div);
                });
            }
        }
    </script>
</body>
</html>
