<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INSTANTOWN — Pagamento Escrow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--verde:#1A7A3A;--verde-l:#22A050;--rosso:#8B1A1A;--ink:#1C1410;--ink-mu:#6B5A4E;--rule:rgba(139,26,26,0.12);--bianco:#FDFAF4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#050505;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
.stripe{height:4px;background:linear-gradient(90deg,#C0392B 33.3%,#fff 33.3%,#fff 66.6%,#4A90C4 66.6%);width:100%;position:fixed;top:0;left:0;}
.back{color:#666;text-decoration:none;font-size:13px;align-self:flex-start;margin-top:20px;}
h2{margin:20px 0 10px;font-family:'Cormorant Garamond',serif;font-size:28px;}
p.sub{color:#666;font-size:14px;margin-bottom:24px;text-align:center;}
.box{background:#1a1a1a;width:100%;max-width:400px;padding:25px;border-radius:20px;border:1px solid #333;}
.summary{background:#000;padding:16px;border-radius:12px;margin-bottom:20px;border:1px dashed #333;}
.summary .lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.06em;}
.summary .amount{font-size:28px;font-weight:900;color:var(--verde);margin:4px 0;}
.summary .desc{font-size:12px;color:#aaa;}
label{display:block;font-size:11px;color:#666;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;}
input{width:100%;padding:14px;background:#000;border:1px solid #333;color:#fff;border-radius:10px;margin-bottom:18px;font-size:16px;font-family:monospace;transition:.2s;}
input:focus{border-color:var(--verde);outline:none;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn-pay{width:100%;padding:18px;background:var(--verde);border:none;border-radius:12px;font-weight:900;font-size:16px;cursor:pointer;color:#fff;text-transform:uppercase;letter-spacing:.04em;transition:background .2s;}
.btn-pay:hover{background:var(--verde-l);}
.btn-pay:disabled{opacity:.4;cursor:not-allowed;}
.badge{font-size:10px;color:#444;text-align:center;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:5px;}
</style>
</head>
<body>
<div class="stripe"></div>
<a href="map.html" class="back">← Torna alla mappa</a>
<h2>Pagamento Escrow</h2>
<p class="sub">I fondi verranno trattenuti e rilasciati solo all'incontro fisico.</p>

<div class="box">
  <div class="summary">
    <div class="lbl">Totale da bloccare</div>
    <div class="amount" id="amount">€ —</div>
    <div class="desc" id="desc-label">—</div>
  </div>

  <label>Numero della Carta</label>
  <input type="text" placeholder="0000 0000 0000 0000" id="card-num" maxlength="19" inputmode="numeric">

  <div class="row2">
    <div>
      <label>Scadenza</label>
      <input type="text" placeholder="MM/AA" maxlength="5" id="card-exp">
    </div>
    <div>
      <label>CVV</label>
      <input type="password" placeholder="***" maxlength="3" id="card-cvv">
    </div>
  </div>

  <button class="btn-pay" id="pay-btn" onclick="pay()">AUTORIZZA E BLOCCA</button>
  <div class="badge">🔒 CRITTOGRAFIA SSL — INSTANTOWN PAY</div>
</div>

<script>
// Legge parametri URL
const params = new URLSearchParams(location.search);
const price  = params.get('price') || '0.00';
const desc   = params.get('title') || params.get('desc') || 'Offerta flash';
const vendor = params.get('vendor') || '';
const idtx   = params.get('idtx') || '';

document.getElementById('amount').textContent = '€ ' + parseFloat(price).toFixed(2);
document.getElementById('desc-label').textContent = (vendor ? vendor + ' — ' : '') + desc;

// Formattazione carta
document.getElementById('card-num').oninput = function() {
  let v = this.value.replace(/\s+/g,'').replace(/[^0-9]/gi,'');
  let parts = [];
  for(let i=0; i<v.length; i+=4) parts.push(v.substring(i,i+4));
  this.value = parts.join(' ');
};
document.getElementById('card-exp').oninput = function() {
  this.value = this.value.replace(/[^\d]/g,'').replace(/(.{2})/,'$1/').trim();
};

function pay() {
  const num = document.getElementById('card-num').value;
  if(num.replace(/\s/g,'').length < 16) { alert('Inserisci un numero di carta valido.'); return; }
  const btn = document.getElementById('pay-btn');
  btn.textContent = 'VERIFICA BANCA...';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = 'FONDI BLOCCATI!';
    btn.style.background = '#fff';
    btn.style.color = '#000';
    setTimeout(() => {
      window.location.href = 'transaction.html?price='+price+'&desc='+encodeURIComponent(desc)+'&idtx='+idtx;
    }, 1000);
  }, 2500);
}
</script>
</body>
</html>
