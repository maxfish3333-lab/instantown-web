<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTANTOWN — Offerte Flash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --rosso:#8B1A1A;--rosso-l:#C0392B;
  --ocra:#C8860A;--ocra-l:#E8A020;--ocra-p:#FDF3DC;
  --cielo:#4A90C4;--cielo-l:#6AAFD8;
  --verde:#16a34a;--verde-p:#f0fdf4;
  --bianco:#FDFAF4;--ink:#1C1410;--ink-m:#3D2E24;--ink-mu:#6B5A4E;
  --rule:rgba(139,26,26,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bianco);color:var(--ink);}
.stripe{height:5px;background:linear-gradient(90deg,var(--rosso-l) 33.3%,#fff 33.3%,#fff 66.6%,var(--cielo) 66.6%);}

nav{background:var(--ink);padding:13px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo img{width:36px;height:36px;object-fit:contain;border-radius:7px;background:#fff;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:#fff;}
.nav-brand span{color:var(--ocra-l);}
.nav-back{color:rgba(255,255,255,.45);font-size:13px;text-decoration:none;}
.nav-back:hover{color:var(--ocra-l);}

.page-header{background:var(--ink);padding:28px 32px;position:relative;overflow:hidden;}
.page-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(200,134,10,.04) 59px,rgba(200,134,10,.04) 60px);pointer-events:none;}
.ph-inner{max-width:1000px;margin:0 auto;position:relative;}
.ph-badge{display:inline-block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ocra-l);border:1px solid rgba(200,134,10,.3);padding:3px 10px;border-radius:2px;margin-bottom:10px;}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#fff;margin-bottom:4px;}
.ph-sub{font-size:12px;color:rgba(255,255,255,.4);}

/* ── FILTRI CATEGORIA ── */
.cat-bar{background:#fff;border-bottom:1px solid var(--rule);padding:0 32px;position:sticky;top:57px;z-index:90;overflow-x:auto;}
.cat-bar-inner{max-width:1000px;margin:0 auto;display:flex;gap:0;align-items:stretch;}
.cat-tab{padding:13px 18px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-mu);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.cat-tab:hover{color:var(--ink);border-bottom-color:var(--rule);}
.cat-tab.active{color:var(--rosso);border-bottom-color:var(--rosso);}
.cat-tab .tab-count{font-size:10px;background:var(--rule);padding:2px 7px;border-radius:20px;color:var(--ink-mu);}
.cat-tab.active .tab-count{background:rgba(139,26,26,.1);color:var(--rosso);}

/* ── SUB FILTRI ── */
.sub-bar{background:var(--bianco);border-bottom:1px solid var(--rule);padding:10px 32px;}
.sub-inner{max-width:1000px;margin:0 auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sub-btn{padding:5px 14px;border:1px solid var(--rule);border-radius:20px;background:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--ink-mu);cursor:pointer;transition:all .2s;}
.sub-btn:hover{border-color:var(--cielo);}
.sub-btn.active{background:var(--rosso);border-color:var(--rosso);color:#fff;}
.sub-raggio{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-mu);}
.sub-raggio select{padding:4px 10px;border:1px solid var(--rule);border-radius:20px;font-size:11px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--ink);}

/* ── PREFERENZE BANNER ── */
.pref-banner{background:var(--cielo-p);border-bottom:1px solid rgba(74,144,196,.2);padding:10px 32px;}
.pref-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--cielo);}
.pref-tag{background:rgba(74,144,196,.12);border:1px solid rgba(74,144,196,.25);padding:3px 10px;border-radius:20px;font-weight:500;}

/* ── MAIN ── */
main{max-width:1000px;margin:0 auto;padding:24px 32px 80px;}

.stats-bar{display:flex;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.stat{background:#fff;border:1px solid var(--rule);border-radius:4px;padding:10px 18px;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--rosso);line-height:1;}
.stat-lbl{font-size:10px;color:var(--ink-mu);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

.offerte-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}

.offerta-card{background:#fff;border:1px solid var(--rule);border-radius:6px;overflow:hidden;box-shadow:0 2px 10px rgba(28,20,16,.04);transition:box-shadow .2s;}
.offerta-card:hover{box-shadow:0 4px 20px rgba(28,20,16,.09);}
.card-foto{width:100%;height:160px;object-fit:cover;display:block;border-bottom:1px solid var(--rule);background:var(--bianco);}
.card-foto-placeholder{width:100%;height:120px;display:flex;align-items:center;justify-content:center;background:var(--bianco);border-bottom:1px solid var(--rule);color:var(--ink-mu);font-size:24px;}
.card-top{padding:16px 16px 12px;border-bottom:1px solid var(--rule);}
.card-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.pill-stato{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.pill-attiva{background:var(--verde-p);color:var(--verde);}
.pill-scaduta{background:#f1f1f1;color:#999;}
.pill-cat{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--ocra-p);color:var(--ocra);}
.pill-raggio{font-size:10px;color:var(--cielo);border:1px solid rgba(74,144,196,.25);padding:3px 9px;border-radius:20px;}
.card-desc{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:5px;line-height:1.4;text-transform:capitalize;}
.card-addr{font-size:11.5px;color:var(--ink-mu);}
.card-prezzi{display:flex;align-items:baseline;gap:8px;margin-top:12px;}
.prezzo-flash{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--rosso);}
.prezzo-std{font-size:12px;color:var(--ink-mu);text-decoration:line-through;}
.sconto-badge{background:var(--ocra-p);color:var(--ocra);font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;margin-left:auto;}
.card-bottom{padding:10px 16px;background:var(--bianco);display:flex;align-items:center;justify-content:space-between;}
.card-orario{font-size:11px;color:var(--ink-mu);}
.card-orario span{color:var(--ink);font-weight:500;}
.card-tx{font-size:9px;color:rgba(139,26,26,.35);font-family:monospace;}
.btn-prenota{background:var(--rosso);color:#fff;border:none;padding:7px 16px;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s;}
.btn-prenota:hover{background:var(--rosso-l);}

.offerta-card.anomalia{border-color:rgba(234,179,8,.4);background:#fffbeb;}
.anomalia-tag{font-size:10px;color:#92400e;background:#fef3c7;padding:2px 7px;border-radius:2px;margin-left:5px;}

.empty{text-align:center;padding:56px 20px;color:var(--ink-mu);}
.empty-icon{font-size:38px;margin-bottom:10px;}
.loading{text-align:center;padding:56px;}
.spinner{width:28px;height:28px;border:3px solid var(--rule);border-top-color:var(--rosso);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{background:var(--ink);color:rgba(255,255,255,.3);font-size:11px;text-align:center;padding:18px;}
footer strong{color:var(--ocra-l);}

/* ── FULL PAGE OVERLAY ── */
.offer-overlay{display:none;position:fixed;inset:0;z-index:999;background:var(--bianco);overflow-y:auto;}
.offer-overlay.open{display:block;}
.ov-stripe{height:5px;background:linear-gradient(90deg,var(--rosso-l) 33.3%,#fff 33.3%,#fff 66.6%,var(--cielo) 66.6%);}
.ov-header{background:var(--ink);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ov-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff;}
.ov-back{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);padding:7px 16px;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.ov-back:hover{border-color:var(--ocra-l);color:var(--ocra-l);}
.ov-body{max-width:680px;margin:0 auto;padding:40px 32px 80px;}
.ov-cat-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.ov-gallery{display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;gap:0;margin-bottom:20px;border-radius:8px;width:100%;}
.ov-title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:16px;text-transform:capitalize;}
.ov-divider{height:1px;background:var(--rule);margin:20px 0;}
.ov-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.ov-info-item{background:#fff;border:1px solid var(--rule);border-radius:4px;padding:14px 18px;}
.ov-info-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mu);margin-bottom:4px;}
.ov-info-value{font-size:15px;font-weight:500;color:var(--ink);}
.ov-prezzi-block{background:#fff;border:1px solid var(--rule);border-radius:6px;padding:22px 24px;margin-bottom:28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.ov-prezzo-flash{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:var(--rosso);line-height:1;}
.ov-prezzo-std{font-size:16px;color:var(--ink-mu);text-decoration:line-through;}
.ov-sconto{background:var(--ocra-p);color:var(--ocra);font-size:13px;font-weight:600;padding:4px 12px;border-radius:3px;}
.ov-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.btn-conferma{background:var(--rosso);color:#fff;border:none;padding:14px 32px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s;}
.btn-conferma:hover{background:var(--rosso-l);}
.btn-ci-ripenso{background:none;border:1px solid var(--rule);color:var(--ink-mu);padding:14px 24px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;}
.btn-ci-ripenso:hover{border-color:var(--ink-mu);color:var(--ink);}
.ov-tx{font-size:10px;color:rgba(139,26,26,.35);font-family:monospace;margin-top:16px;}
@media(max-width:600px){.ov-body{padding:24px 16px 60px;}.ov-info-grid{grid-template-columns:1fr;}.ov-prezzo-flash{font-size:36px;}}

@media(max-width:600px){
  nav,main,.sub-bar,.pref-banner,.page-header{padding-left:16px;padding-right:16px;}
  .offerte-grid{grid-template-columns:1fr;}
}

.card-actions{display:flex;gap:8px;align-items:center;}
.btn-messaggia{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid var(--cielo);color:var(--cielo);border-radius:4px;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-messaggia:hover{background:var(--cielo);color:#fff;}
</style>
<script>
// ── i18n DICTIONARY ──────────────────────────────────────────────
const I18N = {
  it: {
    offerteTitle:'Offerte Flash',liveUpdate:'Aggiornamento live',loading:'Carico le offerte...',noOffers:'Nessuna offerta per questa selezione.',catTutte:'Tutte',catCibo:'Cibo',catModa:'Moda',catTech:'Tech',catViaggi:'Viaggi',catDivert:'Divertimento',catAltro:'Altro',subTutte:'Tutte',subAttive:'Solo attive',subScadute:'Scadute',raggioLabel:'Raggio:',raggioTutti:'Tutti',statTotali:'Offerte totali',statAttive:'Attive ora',statRisparmio:'Risparmio medio',statAnomalie:'Da verificare',btnPrenota:'Prenota →',btnMessageggia:'💬 Messaggia',orarioNd:'Orario n.d.',prefLabel:'Le tue preferenze:',prefModifica:'Modifica',anomTag:'⚠ verifica',adminReview:'Admin review',navBack:'← Homepage',langLabel:'Lang',footerText:'Foglio: offerte · Roma, 2025',datiLocali:'dati locali (Sheet non raggiungibile)',aggiornato:'aggiornato: ',ciRipenso:'Ci ripenso',ovIndirizzo:'Indirizzo',ovOrario:'Orario',ovCategoria:'Categoria',ovRaggio:'Raggio',ovPrezzoFlash:'Prezzo Flash',ovPrezzoStd:'Prezzo standard',ovConferma:'Conferma e prenota →',
  },
  en: {
    offerteTitle:'Flash Deals',liveUpdate:'Live update',loading:'Loading offers...',noOffers:'No offers for this selection.',catTutte:'All',catCibo:'Food',catModa:'Fashion',catTech:'Tech',catViaggi:'Travel',catDivert:'Entertainment',catAltro:'Other',subTutte:'All',subAttive:'Active only',subScadute:'Expired',raggioLabel:'Radius:',raggioTutti:'All',statTotali:'Total offers',statAttive:'Active now',statRisparmio:'Avg. saving',statAnomalie:'To review',btnPrenota:'Book →',btnMessageggia:'💬 Message',orarioNd:'Time n/a',prefLabel:'Your preferences:',prefModifica:'Edit',anomTag:'⚠ review',adminReview:'Admin review',navBack:'← Homepage',langLabel:'Lang',footerText:'Sheet: offers · Rome, 2025',datiLocali:'local data (Sheet unreachable)',aggiornato:'updated: ',ciRipenso:'Never mind',ovIndirizzo:'Address',ovOrario:'Time',ovCategoria:'Category',ovRaggio:'Radius',ovPrezzoFlash:'Flash Price',ovPrezzoStd:'Standard price',ovConferma:'Confirm & book →',
  },
  zh: {
    offerteTitle:'闪购优惠',liveUpdate:'实时更新',loading:'正在加载优惠...',noOffers:'该分类暂无优惠。',catTutte:'全部',catCibo:'餐饮',catModa:'时尚',catTech:'科技',catViaggi:'旅行',catDivert:'娱乐',catAltro:'其他',subTutte:'全部',subAttive:'仅限有效',subScadute:'已过期',raggioLabel:'范围：',raggioTutti:'全部',statTotali:'优惠总数',statAttive:'当前有效',statRisparmio:'平均节省',statAnomalie:'待审核',btnPrenota:'预订 →',btnMessageggia:'💬 消息',orarioNd:'时间未知',prefLabel:'您的偏好：',prefModifica:'修改',anomTag:'⚠ 审核',adminReview:'管理员审核',navBack:'← 首页',langLabel:'语言',footerText:'工作表：优惠 · 罗马，2025',datiLocali:'本地数据（无法连接工作表）',aggiornato:'已更新：',ciRipenso:'我再想想',ovIndirizzo:'地址',ovOrario:'时间',ovCategoria:'分类',ovRaggio:'范围',ovPrezzoFlash:'闪购价',ovPrezzoStd:'原价',ovConferma:'确认预订 →',
  },
  es: {
    offerteTitle:'Ofertas Flash',liveUpdate:'Actualización en vivo',loading:'Cargando ofertas...',noOffers:'Sin ofertas para esta selección.',catTutte:'Todas',catCibo:'Comida',catModa:'Moda',catTech:'Tech',catViaggi:'Viajes',catDivert:'Entretenimiento',catAltro:'Otros',subTutte:'Todas',subAttive:'Solo activas',subScadute:'Caducadas',raggioLabel:'Radio:',raggioTutti:'Todos',statTotali:'Ofertas totales',statAttive:'Activas ahora',statRisparmio:'Ahorro medio',statAnomalie:'Por revisar',btnPrenota:'Reservar →',btnMessageggia:'💬 Mensaje',orarioNd:'Horario n/d',prefLabel:'Tus preferencias:',prefModifica:'Editar',anomTag:'⚠ revisar',adminReview:'Revisión admin',navBack:'← Inicio',langLabel:'Idioma',footerText:'Hoja: ofertas · Roma, 2025',datiLocali:'datos locales (Hoja no disponible)',aggiornato:'actualizado: ',ciRipenso:'Lo reconsidero',ovIndirizzo:'Dirección',ovOrario:'Horario',ovCategoria:'Categoría',ovRaggio:'Radio',ovPrezzoFlash:'Precio Flash',ovPrezzoStd:'Precio estándar',ovConferma:'Confirmar y reservar →',
  },
  fr: {
    offerteTitle:'Offres Flash',liveUpdate:'Mise à jour en direct',loading:'Chargement des offres...',noOffers:'Aucune offre pour cette sélection.',catTutte:'Toutes',catCibo:'Nourriture',catModa:'Mode',catTech:'Tech',catViaggi:'Voyages',catDivert:'Divertissement',catAltro:'Autre',subTutte:'Toutes',subAttive:'Actives seulement',subScadute:'Expirées',raggioLabel:'Rayon :',raggioTutti:'Tous',statTotali:'Offres totales',statAttive:'Actives maintenant',statRisparmio:'Économie moy.',statAnomalie:'À vérifier',btnPrenota:'Réserver →',btnMessageggia:'💬 Message',orarioNd:'Horaire n/d',prefLabel:'Vos préférences :',prefModifica:'Modifier',anomTag:'⚠ vérifier',adminReview:'Révision admin',navBack:'← Accueil',langLabel:'Langue',footerText:'Feuille : offres · Rome, 2025',datiLocali:'données locales (Feuille inaccessible)',aggiornato:'mis à jour : ',ciRipenso:"J'hésite",ovIndirizzo:'Adresse',ovOrario:'Horaire',ovCategoria:'Catégorie',ovRaggio:'Rayon',ovPrezzoFlash:'Prix Flash',ovPrezzoStd:'Prix standard',ovConferma:'Confirmer et réserver →',
  }
};

function t(key) {
  var lang = localStorage.getItem('it_lang') || 'it';
  return (I18N[lang] && I18N[lang][key]) || (I18N['it'][key]) || key;
}

function applyI18nDOM() {
  var lang = localStorage.getItem('it_lang') || 'it';
  // Elementi con data-i18n
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // Nav back
  var nb = document.querySelector('.nav-back');
  if(nb) nb.textContent = t('navBack');
  // Page header badge
  var badge = document.querySelector('.ph-badge');
  if(badge) badge.textContent = t('liveUpdate');
  // Cat tabs (preserva il contatore)
  var catMap = {TUTTE:'catTutte',CIBO:'catCibo',MODA:'catModa',TECH:'catTech',VIAGGI:'catViaggi',DIVERTIMENTO:'catDivert',ALTRO:'catAltro'};
  var emojiMap = {TUTTE:'🗂',CIBO:'🍕',MODA:'👗',TECH:'📱',VIAGGI:'✈️',DIVERTIMENTO:'🎭',ALTRO:'🛍️'};
  document.querySelectorAll('.cat-tab').forEach(function(btn) {
    var cat = btn.getAttribute('data-cat');
    if(cat && catMap[cat]) {
      var counter = btn.querySelector('.tab-count');
      var countHTML = counter ? counter.outerHTML : '';
      btn.innerHTML = (emojiMap[cat]||'') + ' ' + t(catMap[cat]) + ' ' + countHTML;
    }
  });
  // Sub filtri
  var subBtns = document.querySelectorAll('.sub-btn');
  var subKeys = ['subTutte','subAttive','subScadute'];
  subBtns.forEach(function(b, i){ if(subKeys[i]) b.textContent = t(subKeys[i]); });
  // Raggio label
  var rLabel = document.querySelector('.sub-raggio > span');
  if(rLabel) rLabel.textContent = t('raggioLabel');
  var rSelect = document.querySelector('.sub-raggio select option[value="0"]');
  if(rSelect) rSelect.textContent = t('raggioTutti');
  // Stat labels
  var statMap = ['st-totali','st-attive','st-risparmio','st-anomalie'];
  var statKeys = ['statTotali','statAttive','statRisparmio','statAnomalie'];
  statMap.forEach(function(id, i) {
    var el = document.getElementById(id);
    if(el && el.nextElementSibling) el.nextElementSibling.textContent = t(statKeys[i]);
  });
  // Footer
  var footer = document.querySelector('footer');
  if(footer) footer.innerHTML = '<strong>INSTANTOWN PROX</strong> &nbsp;·&nbsp; ' + t('footerText');
}
</script>
</head>
<body>

<div class="stripe"></div>
<nav>
  <div class="nav-logo">
    <img src="logo.png" alt="INSTANTOWN" style="width:46px;height:46px;border-radius:10px;flex-shrink:0;display:block;">
    <span class="nav-brand">INSTANTOWN</span>
  </div>
  <a href="index.html" class="nav-back" data-i18n="navBack">← Homepage</a>
</nav>
<div style="background:var(--ink);border-bottom:1px solid rgba(200,134,10,.15);
  padding:6px 32px;display:flex;align-items:center;gap:6px;">
  <span style="font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.1em;
    text-transform:uppercase;margin-right:6px;">Lang</span>
  <button onclick="applyLang('it')" class="lbtn active" data-lang="it"
    style="background:none;border:1px solid rgba(200,134,10,.25);color:rgba(255,255,255,.5);
    font-size:11px;padding:4px 10px;border-radius:3px;cursor:pointer;">🇮🇹 IT</button>
  <button onclick="applyLang('en')" class="lbtn" data-lang="en"
    style="background:none;border:1px solid rgba(200,134,10,.25);color:rgba(255,255,255,.5);
    font-size:11px;padding:4px 10px;border-radius:3px;cursor:pointer;">🇬🇧 EN</button>
  <button onclick="applyLang('zh')" class="lbtn" data-lang="zh"
    style="background:none;border:1px solid rgba(200,134,10,.25);color:rgba(255,255,255,.5);
    font-size:11px;padding:4px 10px;border-radius:3px;cursor:pointer;">🇨🇳 中文</button>

<script>
const SHEET_ID   = '1m5ovESlhcbVwafN3EOpuYpWUGm1tbH6CtNPTBNZZrOI';
const SHEET_NAME = 'offerte';
const CATS_ALL   = ['CIBO','MODA','TECH','VIAGGI','DIVERTIMENTO','ALTRO'];

// ── Categorie preferite dall'utente (impostate in homepage) ──
const prefCats = JSON.parse(localStorage.getItem('it_categorie') || '[]');

// ── Assegna categoria automatica dalla descrizione se mancante ──
function inferisciCategoria(desc) {
  const d = (desc || '').toLowerCase();
  if(/pizza|pane|farin|cibo|colazip|mangi|kg|pax|food/.test(d)) return 'CIBO';
  if(/moda|abito|vestit|scarpe|borsa/.test(d)) return 'MODA';
  if(/tech|gadget|elettr|computer|phone|jack/.test(d)) return 'TECH';
  if(/viaggio|hotel|volo|tour/.test(d)) return 'VIAGGI';
  if(/concert|spett|teatro|divert|event/.test(d)) return 'DIVERTIMENTO';
  return 'ALTRO';
}

function parseLon(v){
  if(!v && v!==0) return 0;
  var s=String(v).trim().replace(/ /g,'');
  var nV=(s.match(/,/g)||[]).length;
  var nP=(s.match(/\./g)||[]).length;
  var r;
  try{
    if(nV>1){ r=parseInt(s.replace(/,/g,'').replace(/\./g,''))/100000.0; }
    else if(nV===1&&nP===0){ r=parseFloat(s.replace(',','.')); }
    else if(nP===1&&nV===0){ r=parseFloat(s); }
    else if(nP>1){ r=parseFloat(s.replace(/\./g,'').replace(',','.')); }
    else{ r=parseFloat(s.replace(',','.')); }
    if(r>100) r=r/100000.0;
    return isNaN(r)?0:r;
  }catch(e){return 0;}
}
function isAnomalia(o) { return o.prezzoFlash > o.prezzoStd * 1.1; }
function sconto(s,f) {
  if(s<=0||f>=s) return 0;
  return Math.round((1-f/s)*100);
}

const CSV_FALLBACK = [
  {descrizione:'Gadget in offerta',negozio:'',foto:'',prezzoStd:25,prezzoFlash:18,inizio:'14:28',fine:'14:58',indirizzo:'Via Ugo Ojetti 303',lat:41.94655,lon:12.554,idtx:'TX-1778848084968',stato:'ATTIVA',raggio:200,categoria:''},
  {descrizione:'Pizza coi fiocchi',prezzoStd:18.5,prezzoFlash:14.5,inizio:'13:35',fine:'14:05',indirizzo:'Via Ugo Ojetti 303, Roma',lat:41.94655,lon:12.554,idtx:'TX-1778848524566',stato:'ATTIVA',raggio:200,categoria:''},
  {descrizione:'Offerta speciale',prezzoStd:21,prezzoFlash:15,inizio:'13:40',fine:'14:10',indirizzo:'Via Ugo Ojetti 303, Roma',lat:41.94655,lon:12.554,idtx:'TX-1778848816461',stato:'ATTIVA',raggio:200,categoria:''},
  {descrizione:'Meno male al kg',prezzoStd:21,prezzoFlash:16.8,inizio:'13:44',fine:'14:14',indirizzo:'Via Ugo Ojetti 303, Roma',lat:41.94655,lon:12.554,idtx:'TX-1778849076202',stato:'ATTIVA',raggio:200,categoria:''},
  {descrizione:'Pizza al kg',prezzoStd:18,prezzoFlash:165,inizio:'15:59',fine:'16:59',indirizzo:'Via Ugo Ojetti 303, Roma',lat:41.94655,lon:12.554,idtx:'TX-1778857164090',stato:'ATTIVA',raggio:500,categoria:''},
  {descrizione:'Jack per cm',prezzoStd:12,prezzoFlash:11,inizio:'07:01',fine:'07:31',indirizzo:'Via Ugo Ojetti 303, Roma',lat:41.94655,lon:12.554,idtx:'TX-1778911284887',stato:'ATTIVA',raggio:500,categoria:''},
  {descrizione:'Colazione super per 3 pax',prezzoStd:5.80,prezzoFlash:4,inizio:'',fine:'',indirizzo:"Via Palombarese, Sant'Angelo Romano",lat:42.00627,lon:12.67776,idtx:'',stato:'ATTIVA',raggio:200,categoria:''},
];

let tutteOfferte = [];
let filtroCat    = 'TUTTE';
let filtroStato  = 'tutti';
let filtroRaggioV = 0;

async function caricaDaSheet() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));
    const cols = json.table.cols.map(c => c.label.toLowerCase().trim());
    const gi = l => cols.findIndex(c => c.includes(l));
    const gv = (row, l) => { const i=gi(l); return i>=0&&row.c[i]?(row.c[i].v??row.c[i].f??''):''; };
    const parseFoto = (val) => String(val||'').split(/[,\n|]/).map(s=>s.trim()).filter(Boolean);
    const parseTime = (row, label) => {
      const i=gi(label); if(i<0||!row.c[i]) return '';
      const v=row.c[i].v||'';
      const m=String(v).match(/Date\(\d+,\d+,\d+,(\d+),(\d+)/);
      if(m) return m[1].padStart(2,'0')+':'+m[2].padStart(2,'0');
      return String(row.c[i].f||v);
    };
    return json.table.rows.map(row => ({
      descrizione: gv(row,'descrizione'),
      traduzioni:  (()=>{ try{ return JSON.parse(gv(row,'traduzioni')||'{}'); }catch(e){ return {}; } })(),
      prezzoStd:   parseFloat(gv(row,'prezzo std'))||0,
      prezzoFlash: parseFloat(gv(row,'prezzo flash'))||0,
      inizio:      parseTime(row,'inizio'),
      fine:        parseTime(row,'fine'),
      indirizzo:   gv(row,'indirizzo'),
      negozio:     gv(row,'negozio'),
      foto:        gv(row,'foto'),
      fotos:       parseFoto(gv(row,'foto')),
      lat:         parseFloat(gv(row,'lat'))||0,
      lon:         parseLon(gv(row,'lon')),
      idtx:        gv(row,'id tx')||gv(row,'idtx'),
      stato:       gv(row,'stato')||'ATTIVA',
      raggio:      parseInt(gv(row,'raggio'))||200,
      categoria:   (gv(row,'categoria')||'').toUpperCase(),
    })).filter(o => o.descrizione);
  } catch(e) {
    const el = document.getElementById('ultimo-agg');
    if(el) el.textContent = 'ERRORE: ' + (e&&e.message?e.message:String(e));
    return null;
  }
}

function normalizza(offerte) {
  return offerte.map(o => ({
    ...o,
    categoria: o.categoria && CATS_ALL.includes(o.categoria)
      ? o.categoria
      : inferisciCategoria(o.descrizione)
  }));
}

function aggiornaCounts(offerte) {
  const counts = {};
  CATS_ALL.forEach(c => counts[c] = 0);
  offerte.forEach(o => { if(counts[o.categoria] !== undefined) counts[o.categoria]++; });

  // Aggiorna tab counts
  document.getElementById('tc-TUTTE').textContent = offerte.length;
  CATS_ALL.forEach(c => {
    const el = document.getElementById('tc-' + c);
    if(el) el.textContent = counts[c];
  });

  // Scrivi in localStorage per homepage
  localStorage.setItem('it_cat_counts', JSON.stringify(counts));
}

function aggiornaStats(offerte) {
  const attive = offerte.filter(o => o.stato==='ATTIVA').length;
  const anomalie = offerte.filter(isAnomalia).length;
  const risparmi = offerte.filter(o=>!isAnomalia(o)&&o.prezzoStd>0).map(o=>sconto(o.prezzoStd,o.prezzoFlash));
  const media = risparmi.length ? Math.round(risparmi.reduce((a,b)=>a+b,0)/risparmi.length) : 0;
  document.getElementById('st-totali').textContent = offerte.length;
  document.getElementById('st-attive').textContent = attive;
  document.getElementById('st-risparmio').textContent = media + '%';
  document.getElementById('st-anomalie').textContent = anomalie;
}

function mostraPref() {
  const banner = document.getElementById('pref-banner');
  const inner  = document.getElementById('pref-inner');
  if(prefCats.length === 0) { banner.style.display='none'; return; }
  banner.style.display = '';
  const emoji = {CIBO:'🍕',MODA:'👗',TECH:'📱',VIAGGI:'✈️',DIVERTIMENTO:'🎭',ALTRO:'🛍️'};
  inner.innerHTML = `<span style="font-size:12px;font-weight:500;">${t('prefLabel')}</span> `
    + prefCats.map(c=>`<span class="pref-tag">${emoji[c]||''} ${c}</span>`).join('')
    + ` <a href="index.html" style="color:var(--cielo);font-size:11px;margin-left:8px;">${t('prefModifica')}</a>`;
}

function getDesc(o) {
  var lang = localStorage.getItem('it_lang') || 'it';
  if (lang !== 'it' && o.traduzioni && o.traduzioni[lang]) return o.traduzioni[lang];
  return o.descrizione || '';
}

function renderCard(o) {
  const sc   = sconto(o.prezzoStd, o.prezzoFlash);
  const anom = isAnomalia(o);
  var rawDesc = getDesc(o);
  const desc = rawDesc ? rawDesc.charAt(0).toUpperCase() + rawDesc.slice(1).toLowerCase() : '—';
  const orario = (o.inizio&&o.fine) ? `${o.inizio} → ${o.fine}` : t('orarioNd');
  const emoji  = {CIBO:'🍕',MODA:'👗',TECH:'📱',VIAGGI:'✈️',DIVERTIMENTO:'🎭',ALTRO:'🛍️'};
  const isPref = prefCats.includes(o.categoria);

  return `
  <div class="offerta-card ${anom?'anomalia':''}" style="${isPref?'border-color:var(--cielo);':''}">
    ${(o.fotos&&o.fotos.length)?`<img class="card-foto" src="${o.fotos[0]}" alt="${desc}" onerror="this.style.display='none'">`:`<div class="card-foto-placeholder">📷</div>`}
    <div class="card-top">
      <div class="card-row1">
        <span class="pill-stato ${o.stato==='ATTIVA'?'pill-attiva':'pill-scaduta'}">${o.stato}</span>
        <span class="pill-cat">${emoji[o.categoria]||''} ${o.categoria}</span>
        <span class="pill-raggio">${o.raggio}m</span>
      </div>
      <div class="card-desc">${desc}${anom?`<span class="anomalia-tag">${t('anomTag')}</span>`:''}</div>
      <div class="card-addr">📍 ${o.indirizzo||'—'}</div>
      <div class="card-prezzi">
        <span class="prezzo-flash">€ ${o.prezzoFlash.toFixed(2)}</span>
        ${o.prezzoStd>0?`<span class="prezzo-std">€ ${o.prezzoStd.toFixed(2)}</span>`:''}
        ${sc>0&&!anom?`<span class="sconto-badge">-${sc}%</span>`:''}
      </div>
    </div>
    <div class="card-bottom">
      <div>
        <div class="card-orario">⏱ <span>${orario}</span></div>
        ${o.idtx?`<div class="card-tx">${o.idtx}</div>`:''}
      </div>
      ${!anom?`<div class="card-actions"><button class="btn-prenota" data-offer='${JSON.stringify(o).replace(/'/g,"&#39;")}' onclick="apriOverlayBtn(this)">${t('btnPrenota')}</button>${o.idtx?`<a href="chat.html?tx=${o.idtx}" class="btn-messaggia">${t('btnMessageggia')}</a>`:''}</div>`:`<span style="font-size:11px;color:#92400e;">${t('adminReview')}</span>`}
    </div>
  </div>`;
}

function renderLista() {
  let filtrate = tutteOfferte;
  if(filtroCat !== 'TUTTE') filtrate = filtrate.filter(o => o.categoria === filtroCat);
  if(filtroStato === 'attive')  filtrate = filtrate.filter(o => o.stato==='ATTIVA');
  if(filtroStato === 'scadute') filtrate = filtrate.filter(o => o.stato!=='ATTIVA');
  if(filtroRaggioV > 0)         filtrate = filtrate.filter(o => o.raggio===filtroRaggioV);

  // Metti prima le offerte delle categorie preferite
  if(prefCats.length > 0) {
    filtrate = [
      ...filtrate.filter(o => prefCats.includes(o.categoria)),
      ...filtrate.filter(o => !prefCats.includes(o.categoria)),
    ];
  }

  const container = document.getElementById('offerte-container');
  if(filtrate.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>${t('noOffers')}</p></div>`;
    return;
  }
  container.innerHTML = `<div class="offerte-grid">${filtrate.map(renderCard).join('')}</div>`;
}

function filtraCat(cat, btn) {
  filtroCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
}
function filtraStato(stato, btn) {
  filtroStato = stato;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
}
function filtraRaggio(v) {
  filtroRaggioV = parseInt(v)||0;
  renderLista();
}

async function init() {
  document.getElementById('ultimo-agg').textContent = t('loading');
  let dati = await caricaDaSheet();
  if(!dati) {
    tutteOfferte = normalizza(CSV_FALLBACK);
    document.getElementById('ultimo-agg').textContent = t('datiLocali');
  } else {
    tutteOfferte = normalizza(dati);
    document.getElementById('ultimo-agg').textContent = t('aggiornato') + new Date().toLocaleTimeString('it-IT');
  }
  aggiornaCounts(tutteOfferte);
  aggiornaStats(tutteOfferte);
  mostraPref();
  applyI18nDOM();

  // Se arrivo da homepage con categoria preferita, pre-filtro
  const params = new URLSearchParams(location.search);
  const catParam = params.get('cat');
  if(catParam && CATS_ALL.includes(catParam)) {
    const tab = document.querySelector(`[data-cat="${catParam}"]`);
    if(tab) filtraCat(catParam, tab);
  } else {
    renderLista();
  }

  setInterval(init, 60000);
}

function apriOverlayBtn(btn) {
  try { apriOverlay(JSON.parse(btn.getAttribute('data-offer'))); } catch(e) { console.error(e); }
}

init();
function applyLang(lang) {
  var ok = ['it','en','zh','es','fr'];
  if (!ok.includes(lang)) lang = 'it';
  localStorage.setItem('it_lang', lang);
  document.querySelectorAll('.lbtn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
    b.style.background = b.getAttribute('data-lang') === lang ? 'var(--ocra)' : 'none';
    b.style.color = b.getAttribute('data-lang') === lang ? 'var(--ink)' : 'rgba(255,255,255,.5)';
    b.style.fontWeight = b.getAttribute('data-lang') === lang ? '700' : '400';
  });
  applyI18nDOM();
  if (typeof renderLista === 'function') renderLista();
}

</script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const lang = localStorage.getItem('it_lang') || 'it';
  applyLang(lang);
});
</script>
</body>
</html>
