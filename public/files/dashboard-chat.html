<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTANTOWN — Dashboard Messaggi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --rosso:#8B1A1A;--rosso-l:#C0392B;
  --ocra:#C8860A;--ocra-l:#E8A020;--ocra-p:#FDF3DC;
  --ink:#1C1410;--ink-m:#3D2E24;--ink-mu:#6B5A4E;
  --bianco:#FDFAF4;--rule:rgba(139,26,26,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:#fff;min-height:100vh;display:flex;flex-direction:column;}

.header{background:#1C1410;border-bottom:1px solid rgba(200,134,10,.2);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.header img{width:36px;height:36px;border-radius:8px;}
.header-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#fff;flex:1;}
.header-negozio{font-size:12px;color:var(--ocra-l);margin-top:1px;}
.header-back{color:rgba(255,255,255,.4);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid rgba(255,255,255,.15);border-radius:4px;}
.header-back:hover{color:var(--ocra-l);border-color:var(--ocra-l);}

/* LOGIN */
#login-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
.login-box{background:rgba(255,255,255,.04);border:1px solid rgba(200,134,10,.2);border-radius:16px;padding:36px 32px;max-width:380px;width:100%;text-align:center;}
.login-icon{font-size:48px;margin-bottom:16px;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#fff;margin-bottom:8px;}
.login-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:24px;}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(200,134,10,.3);border-radius:8px;padding:14px 16px;font-size:18px;color:#fff;font-family:'DM Sans',sans-serif;letter-spacing:.15em;text-align:center;outline:none;transition:border .2s;}
.login-input:focus{border-color:var(--ocra-l);}
.login-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:.05em;}
.login-btn{width:100%;margin-top:14px;background:var(--ocra);color:#1C1410;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;}
.login-btn:hover{background:var(--ocra-l);}
.login-error{color:#ff6b6b;font-size:12px;margin-top:10px;display:none;}

/* DASHBOARD */
#dashboard{flex:1;display:none;flex-direction:row;}

/* LISTA CHAT */
.chat-list{width:300px;border-right:1px solid rgba(200,134,10,.15);overflow-y:auto;flex-shrink:0;}
.chat-list-header{padding:16px 20px;border-bottom:1px solid rgba(200,134,10,.15);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);}
.chat-item{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;}
.chat-item:hover{background:rgba(255,255,255,.04);}
.chat-item.active{background:rgba(200,134,10,.08);border-left:3px solid var(--ocra);}
.chat-item-tx{font-size:13px;font-weight:500;color:var(--ocra-l);margin-bottom:4px;}
.chat-item-msg{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-item-time{font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;}
.badge-new{display:inline-block;background:var(--rosso-l);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:6px;}
.no-chats{padding:40px 20px;text-align:center;color:rgba(255,255,255,.25);font-size:13px;}

/* AREA CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-area-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.2);font-size:13px;gap:8px;}
.chat-area-empty-icon{font-size:40px;}
.chat-area-header{padding:14px 20px;border-bottom:1px solid rgba(200,134,10,.15);display:flex;align-items:center;justify-content:space-between;}
.chat-area-tx{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:75%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.5;}
.msg-cliente{background:rgba(255,255,255,.08);color:#fff;align-self:flex-start;border-bottom-left-radius:4px;}
.msg-esercente{background:var(--ocra);color:#1C1410;align-self:flex-end;border-bottom-right-radius:4px;}
.msg-sistema{background:rgba(139,26,26,.2);color:rgba(255,255,255,.6);align-self:center;font-size:12px;text-align:center;border-radius:20px;padding:6px 14px;}
.msg-time{font-size:10px;opacity:.6;margin-top:4px;}
.msg-esercente .msg-time{text-align:right;}
.chat-input-bar{background:#1C1410;border-top:1px solid rgba(200,134,10,.2);padding:14px 16px;display:flex;gap:10px;align-items:flex-end;}
.chat-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(200,134,10,.2);border-radius:10px;padding:12px 14px;font-size:14px;color:#fff;font-family:'DM Sans',sans-serif;resize:none;outline:none;min-height:44px;max-height:120px;transition:border .2s;}
.chat-input:focus{border-color:var(--ocra-l);}
.chat-input::placeholder{color:rgba(255,255,255,.25);}
.send-btn{background:var(--ocra);color:#1C1410;border:none;border-radius:10px;width:44px;height:44px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{background:var(--ocra-l);}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--ocra-l);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:600px){
  #dashboard{flex-direction:column;}
  .chat-list{width:100%;max-height:200px;border-right:none;border-bottom:1px solid rgba(200,134,10,.15);}
}
</style>
</head>
<body>

<div class="header">
  <img src="Nuovo_logo_3_diss.png" onerror="this.src='icon-192.png'" alt="INSTANTOWN">
  <div style="flex:1;">
    <div class="header-title">Dashboard Messaggi</div>
    <div class="header-negozio" id="header-negozio"></div>
  </div>
  <a href="index.html" class="header-back">← Home</a>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🏪</div>
    <div class="login-title">Accesso esercente</div>
    <div class="login-desc">Inserisci il tuo PIN per vedere i messaggi dei clienti.</div>
    <input class="login-input" id="pin-input" type="password" placeholder="PIN" maxlength="10" autocomplete="off">
    <button class="login-btn" onclick="accediDashboard()">Accedi →</button>
    <div class="login-error" id="login-error">PIN non trovato. Controlla e riprova.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="chat-list" id="chat-list">
    <div class="chat-list-header">Conversazioni</div>
    <div class="no-chats" id="no-chats">Nessun messaggio ancora.</div>
  </div>
  <div class="chat-area" id="chat-area">
    <div class="chat-area-empty" id="chat-area-empty">
      <div class="chat-area-empty-icon">💬</div>
      <div>Seleziona una conversazione</div>
    </div>
    <div id="chat-active" style="display:none;flex:1;flex-direction:column;">
      <div class="chat-area-header">
        <div class="chat-area-tx" id="active-tx"></div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="chat-input-bar">
        <textarea class="chat-input" id="msg-input" placeholder="Rispondi al cliente..." rows="1"></textarea>
        <button class="send-btn" onclick="inviaMsgEsercente()">➤</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBez4L85HA1__NPKOzagfmKeoGLniIQeAc",
  authDomain: "instantown-app.firebaseapp.com",
  projectId: "instantown-app",
  storageBucket: "instantown-app.firebasestorage.app",
  messagingSenderId: "469598782572",
  appId: "1:469598782572:web:7fc20afb17a3c3c6d68449",
  measurementId: "G-D45LJHDDXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let negozioCorrente = null;
let currentTX = null;
let unsubMessages = null;
let unsubChats = null;

window.accediDashboard = async function() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;

  const btn = document.querySelector('.login-btn');
  btn.innerHTML = '<span class="loading"></span>';
  btn.disabled = true;

  try {
    // Verifica PIN nel Google Sheet tab anagrafica
    const SHEET_ID = '1m5ovESlhcbVwafN3EOpuYpWUGm1tbH6CtNPTBNZZrOI';
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=anagrafica%20negozi`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));
    const cols = json.table.cols.map(c => c.label.toLowerCase().trim());
    const pinIdx = cols.findIndex(c => c.includes('pin'));
    const nomeIdx = cols.findIndex(c => c.includes('nome'));

    let trovato = null;
    for (const row of json.table.rows) {
      if (!row.c[pinIdx]) continue;
      const val = (row.c[pinIdx].v || '').toString().trim();
      if (val === pin) {
        trovato = { nome: row.c[nomeIdx] ? row.c[nomeIdx].v : 'Negozio' };
        break;
      }
    }

    if (!trovato) {
      document.getElementById('login-error').style.display = 'block';
      btn.innerHTML = 'Accedi →';
      btn.disabled = false;
      return;
    }

    negozioCorrente = trovato.nome;
    document.getElementById('header-negozio').textContent = trovato.nome;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';

    caricaChats(trovato.nome);

  } catch(e) {
    console.error(e);
    document.getElementById('login-error').textContent = 'Errore di connessione.';
    document.getElementById('login-error').style.display = 'block';
    btn.innerHTML = 'Accedi →';
    btn.disabled = false;
  }
};

function caricaChats(negozio) {
  // Ascolta tutte le chat in realtime
  unsubChats = onSnapshot(collection(db, 'chats'), (snap) => {
    const list = document.getElementById('chat-list');
    const noChats = document.getElementById('no-chats');
    const items = list.querySelectorAll('.chat-item');
    items.forEach(i => i.remove());

    let count = 0;
    snap.forEach(doc => {
      const d = doc.data();
      // Mostra solo le chat di questo negozio
      if (d.negozio !== negozio) return;
      count++;
      noChats.style.display = 'none';
      const item = document.createElement('div');
      item.className = 'chat-item' + (doc.id === currentTX ? ' active' : '');
      item.onclick = () => apriChat(doc.id);
      const ora = d.ultimoTs ? new Date(d.ultimoTs.seconds * 1000).toLocaleString('it-IT', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      item.innerHTML = `
        <div class="chat-item-tx">${doc.id}${d.daLeggere ? '<span class="badge-new">NEW</span>' : ''}</div>
        <div class="chat-item-msg">${d.ultimoMsg || 'Nessun messaggio'}</div>
        <div class="chat-item-time">${ora}</div>
      `;
      list.appendChild(item);
    });
    if (count === 0) noChats.style.display = 'block';
  });
}

window.apriChat = function(tx) {
  currentTX = tx;
  document.getElementById('chat-area-empty').style.display = 'none';
  const active = document.getElementById('chat-active');
  active.style.display = 'flex';
  document.getElementById('active-tx').textContent = tx;

  // Segna come letto
  updateDoc(doc(db, 'chats', tx), { daLeggere: false }).catch(() => {});

  if (unsubMessages) unsubMessages();
  const q = query(collection(db, 'chats', tx, 'messages'), orderBy('ts'));
  unsubMessages = onSnapshot(q, (snap) => {
    const container = document.getElementById('messages');
    container.innerHTML = '';
    snap.forEach(d => {
      const msg = d.data();
      const div = document.createElement('div');
      div.className = 'msg msg-' + (msg.da === 'esercente' ? 'esercente' : msg.da === 'sistema' ? 'sistema' : 'cliente');
      const ora = msg.ts ? new Date(msg.ts.seconds * 1000).toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'}) : '';
      div.innerHTML = `<div>${msg.testo}</div>${ora ? `<div class="msg-time">${ora}</div>` : ''}`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  });

  // Aggiorna active in lista
  document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.chat-item').forEach(i => {
    if (i.querySelector('.chat-item-tx').textContent.includes(tx)) i.classList.add('active');
  });
};

window.inviaMsgEsercente = async function() {
  const input = document.getElementById('msg-input');
  const testo = input.value.trim();
  if (!testo || !currentTX) return;
  input.value = '';
  try {
    await addDoc(collection(db, 'chats', currentTX, 'messages'), {
      testo, da: 'esercente', ts: serverTimestamp()
    });
    await updateDoc(doc(db, 'chats', currentTX), {
      ultimoMsg: testo, ultimoTs: serverTimestamp(), daLeggere: false
    });
  } catch(e) { console.error(e); }
};

document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.inviaMsgEsercente(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
