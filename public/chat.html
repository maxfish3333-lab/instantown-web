<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTANTOWN — Chat prenotazione</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --rosso:#8B1A1A;--rosso-l:#C0392B;
  --ocra:#C8860A;--ocra-l:#E8A020;
  --ink:#1C1410;--ink-m:#3D2E24;--ink-mu:#6B5A4E;
  --bianco:#FDFAF4;--rule:rgba(139,26,26,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:#fff;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.chat-header{background:#1C1410;border-bottom:1px solid rgba(200,134,10,.2);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.chat-header img{width:36px;height:36px;border-radius:8px;}
.chat-header-info{flex:1;}
.chat-header-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff;}
.chat-header-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
.chat-header-back{color:rgba(255,255,255,.4);text-decoration:none;font-size:13px;padding:6px 12px;border:1px solid rgba(255,255,255,.15);border-radius:4px;transition:all .2s;}
.chat-header-back:hover{color:var(--ocra-l);border-color:var(--ocra-l);}

/* LOGIN */
#login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.login-box{background:rgba(255,255,255,.04);border:1px solid rgba(200,134,10,.2);border-radius:16px;padding:36px 32px;max-width:400px;width:100%;text-align:center;}
.login-icon{font-size:48px;margin-bottom:16px;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#fff;margin-bottom:8px;}
.login-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:24px;}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(200,134,10,.3);border-radius:8px;padding:14px 16px;font-size:15px;color:#fff;font-family:'DM Sans',sans-serif;letter-spacing:.05em;outline:none;transition:border .2s;}
.login-input:focus{border-color:var(--ocra-l);}
.login-input::placeholder{color:rgba(255,255,255,.25);}
.login-btn{width:100%;margin-top:14px;background:var(--ocra);color:#1C1410;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;}
.login-btn:hover{background:var(--ocra-l);}
.login-error{color:#ff6b6b;font-size:12px;margin-top:10px;display:none;}

/* CHAT */
#chat-screen{flex:1;display:none;flex-direction:column;}
.chat-info-bar{background:rgba(200,134,10,.08);border-bottom:1px solid rgba(200,134,10,.15);padding:12px 20px;font-size:12px;color:rgba(255,255,255,.5);}
.chat-info-bar strong{color:var(--ocra-l);}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:0;}
.msg{max-width:75%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.5;}
.msg-cliente{background:var(--ocra);color:#1C1410;align-self:flex-end;border-bottom-right-radius:4px;}
.msg-esercente{background:rgba(255,255,255,.08);color:#fff;align-self:flex-start;border-bottom-left-radius:4px;}
.msg-sistema{background:rgba(139,26,26,.2);color:rgba(255,255,255,.6);align-self:center;font-size:12px;text-align:center;border-radius:20px;padding:6px 14px;}
.msg-time{font-size:10px;opacity:.6;margin-top:4px;}
.msg-cliente .msg-time{text-align:right;}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.25);font-size:13px;gap:8px;}
.empty-chat-icon{font-size:36px;}

/* INPUT */
.chat-input-bar{background:#1C1410;border-top:1px solid rgba(200,134,10,.2);padding:14px 16px;display:flex;gap:10px;align-items:flex-end;}
.chat-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(200,134,10,.2);border-radius:10px;padding:12px 14px;font-size:14px;color:#fff;font-family:'DM Sans',sans-serif;resize:none;outline:none;min-height:44px;max-height:120px;transition:border .2s;}
.chat-input:focus{border-color:var(--ocra-l);}
.chat-input::placeholder{color:rgba(255,255,255,.25);}
.send-btn{background:var(--ocra);color:#1C1410;border:none;border-radius:10px;width:44px;height:44px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.send-btn:hover{background:var(--ocra-l);}
.send-btn:disabled{background:rgba(200,134,10,.3);cursor:not-allowed;}

/* LOADING */
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--ocra-l);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="chat-header">
  <img src="Nuovo_logo_3_diss.png" onerror="this.src='icon-192.png'" alt="INSTANTOWN">
  <div class="chat-header-info">
    <div class="chat-header-title">INSTANTOWN Chat</div>
    <div class="chat-header-sub" id="header-sub">Inserisci il tuo codice prenotazione</div>
  </div>
  <a href="index.html" class="chat-header-back">← Home</a>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">💬</div>
    <div class="login-title">Chat prenotazione</div>
    <div class="login-desc">Inserisci il codice della tua prenotazione (es. TX-12345678) per contattare l'esercente.</div>
    <input class="login-input" id="tx-input" type="text" placeholder="TX-XXXXXXXX" maxlength="20" autocomplete="off" autocapitalize="characters">
    <button class="login-btn" onclick="accediChat()">Accedi alla chat →</button>
    <div class="login-error" id="login-error">Codice non trovato. Controlla e riprova.</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="chat-info-bar">
    Prenotazione <strong id="info-tx"></strong> · Negozio: <strong id="info-negozio"></strong>
  </div>
  <div class="messages" id="messages">
    <div class="empty-chat" id="empty-msg">
      <div class="empty-chat-icon">✉️</div>
      <div>Nessun messaggio ancora.<br>Scrivi all'esercente qui sotto.</div>
    </div>
  </div>
  <div class="chat-input-bar">
    <textarea class="chat-input" id="msg-input" placeholder="Scrivi un messaggio..." rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="inviaMsgCliente()">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBez4L85HA1__NPKOzagfmKeoGLniIQeAc",
  authDomain: "instantown-app.firebaseapp.com",
  projectId: "instantown-app",
  storageBucket: "instantown-app.firebasestorage.app",
  messagingSenderId: "469598782572",
  appId: "1:469598782572:web:7fc20afb17a3c3c6d68449",
  measurementId: "G-D45LJHDDXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentTX = null;
let unsubscribe = null;

window.accediChat = async function() {
  const tx = document.getElementById('tx-input').value.trim().toUpperCase();
  if (!tx || !tx.startsWith('TX-')) {
    mostraErrore('Formato non valido. Usa TX-XXXXXXXX');
    return;
  }

  const btn = document.querySelector('.login-btn');
  btn.innerHTML = '<span class="loading"></span>';
  btn.disabled = true;

  try {
    // Verifica TX nel Google Sheet
    const SHEET_ID = '1m5ovESlhcbVwafN3EOpuYpWUGm1tbH6CtNPTBNZZrOI';
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=offerte`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));
    const cols = json.table.cols.map(c => c.label.toLowerCase().trim());
    const txIdx = cols.findIndex(c => c.includes('id tx') || c.includes('idtx') || c.includes('tx'));
    const negIdx = cols.findIndex(c => c.includes('negozio'));

    let trovato = null;
    for (const row of json.table.rows) {
      if (!row.c[txIdx]) continue;
      const val = (row.c[txIdx].v || row.c[txIdx].f || '').toString().trim().toUpperCase();
      if (val === tx) {
        trovato = { negozio: row.c[negIdx] ? row.c[negIdx].v : 'Esercente' };
        break;
      }
    }

    if (!trovato) {
      mostraErrore('Codice non trovato. Controlla e riprova.');
      btn.innerHTML = 'Accedi alla chat →';
      btn.disabled = false;
      return;
    }

    // Accesso ok
    currentTX = tx;
    document.getElementById('info-tx').textContent = tx;
    document.getElementById('info-negozio').textContent = trovato.negozio;
    document.getElementById('header-sub').textContent = trovato.negozio;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';

    // Ascolta messaggi in realtime
    ascoltaMessaggi(tx);

  } catch(e) {
    mostraErrore('Errore di connessione. Riprova.');
    btn.innerHTML = 'Accedi alla chat →';
    btn.disabled = false;
  }
};

function mostraErrore(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function ascoltaMessaggi(tx) {
  const q = query(collection(db, 'chats', tx, 'messages'), orderBy('ts'));
  unsubscribe = onSnapshot(q, (snap) => {
    const container = document.getElementById('messages');
    const empty = document.getElementById('empty-msg');
    if (snap.empty) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';
    // Ricostruisci messaggi
    const existing = container.querySelectorAll('.msg');
    existing.forEach(e => e.remove());
    snap.forEach(doc => {
      const d = doc.data();
      const div = document.createElement('div');
      div.className = 'msg msg-' + (d.da === 'cliente' ? 'cliente' : d.da === 'sistema' ? 'sistema' : 'esercente');
      const ora = d.ts ? new Date(d.ts.seconds * 1000).toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'}) : '';
      div.innerHTML = `<div>${d.testo}</div>${ora ? `<div class="msg-time">${ora}</div>` : ''}`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  });
}

window.inviaMsgCliente = async function() {
  const input = document.getElementById('msg-input');
  const testo = input.value.trim();
  if (!testo || !currentTX) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';
  try {
    await addDoc(collection(db, 'chats', currentTX, 'messages'), {
      testo, da: 'cliente', ts: serverTimestamp()
    });
    // Aggiorna documento padre con info
    const { setDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await setDoc(doc(db, 'chats', currentTX), {
      negozio: document.getElementById('info-negozio').textContent,
      ultimoMsg: testo,
      ultimoTs: serverTimestamp(),
      daLeggere: true
    }, { merge: true });
  } catch(e) {
    console.error(e);
  }
  btn.disabled = false;
  input.focus();
};

// Invio con Enter
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    window.inviaMsgCliente();
  }
});

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Auto-login se TX passato via URL
document.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const tx = params.get('tx');
  if (tx) {
    document.getElementById('tx-input').value = tx;
    window.accediChat();
  }
});

</script>
</body>
</html>
